apiVersion: openr.ag/v1alpha1
kind: OpenRAG
metadata:
  name: my-openrag
  namespace: my-tenant
spec:
  targetNamespace: my-tenant

  frontend:
    image: langflowai/openrag-frontend:latest
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

  backend:
    image: langflowai/openrag-backend:latest
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
    # jwtSigningKeySecret:
    #   name: my-jwt-secret
    #   key: JWT_SIGNING_KEY
    storage:
      enabled: true
      size: "1Gi"
    # flowIds:
    #   chat: ""
    #   ingest: ""
    #   urlIngest: ""
    #   nudges: ""

  langflow:
    image: langflowai/openrag-langflow:latest
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      enabled: true
      size: "1Gi"
    flowsRef: release-saas-0.1   # branch name or commit SHA
    # flowsInitImage: python:3-alpine

  # llm:
  #   provider: watsonx
  #   model: ibm/granite-3-2-8b-instruct

  # embedding:
  #   provider: watsonx
  #   model: ibm/granite-embedding-278m-multilingual

  # watsonx:
  #   endpoint: https://us-south.ml.cloud.ibm.com
  #   projectId: ""
  #   apiKeySecret:
  #     name: my-watsonx-secret
  #     key: WATSONX_API_KEY

  # External OpenSearch — required unless credentials are in backend envSecret
  # opensearch:
  #   host: opensearch-coordinating.opensearch.svc.cluster.local
  #   port: 9200
  #   scheme: https
  #   indexName: documents
  #   credentialsSecret: opensearch-credentials   # keys: username, password

  # Operator-managed Docling components — optional document processing
  # doclingComponents:
  #   enabled: true
  #   serve:
  #     image: langflowai/docling-serve:latest
  #     replicas: 2
  #     port: 5001
  #     resources:
  #       requests:
  #         cpu: "1"
  #         memory: "2Gi"
  #       limits:
  #         cpu: "2"
  #         memory: "4Gi"
  #     storage:
  #       enabled: true
  #       size: "20Gi"
  #       storageClassName: "fast-ssd"
  #     nodeSelector:
  #       workload: "cpu-intensive"
  #     tolerations:
  #       - key: "docling"
  #         operator: "Equal"
  #         value: "true"
  #         effect: "NoSchedule"
  #     labels:
  #       team: "ml-ops"
  #     annotations:
  #       prometheus.io/scrape: "true"
  #       prometheus.io/port: "5001"
  #     podLabels:
  #       app.kubernetes.io/component: "document-processor"
  #     podAnnotations:
  #       sidecar.istio.io/inject: "true"
  #     hpa:
  #       enabled: true
  #       minReplicas: 1
  #       maxReplicas: 5
  #       targetCPUUtilizationPercentage: 70
  #       targetMemoryUtilizationPercentage: 80
  #   worker:
  #     image: langflowai/docling-worker:latest
  #     replicas: 3
  #     resources:
  #       requests:
  #         cpu: "2"
  #         memory: "4Gi"
