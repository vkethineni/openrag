  # External Docling — optional external document conversion service (legacy)
  # Use doclingComponents above to deploy docling within the operator
  # docling:
  #   host: docling-serve.docling.svc.cluster.local
  #   port: 5001
  #   scheme: http

  networkPolicy:
    enabled: false
